{% extends 'admin/base.html' %}
{% block title %}Skills{% endblock %}
{% block page_title %}Skills{% endblock %}
{% block content %}
<div class="d-flex justify-content-end mb-3">
    <a href="{{ url_for('admin_add_skill') }}" class="btn btn-primary">
        <i class="fas fa-plus me-2"></i> Add Skill
    </a>
</div>
<div class="table-card">
    <table class="table table-hover mb-0">
        <thead><tr><th>#</th><th>Icon</th><th>Name</th><th>Description</th><th>Actions</th></tr></thead>
        <tbody>
            {% for s in skills %}
            <tr>
                <td>{{ s.order_num }}</td>
                <td><i class="{{ s.icon_class }} fa-lg text-primary"></i></td>
                <td><strong>{{ s.name }}</strong></td>
                <td>{{ s.description }}</td>
                <td>
                    <a href="{{ url_for('admin_edit_skill', id=s.id) }}" class="btn btn-outline-primary btn-sm me-1"><i class="fas fa-edit"></i></a>
                    <form method="POST" action="{{ url_for('admin_delete_skill', id=s.id) }}" style="display:inline" onsubmit="return confirm('Delete?')">
                        <button type="submit" class="btn btn-outline-danger btn-sm"><i class="fas fa-trash"></i></button>
                    </form>
                </td>
            </tr>
            {% else %}
            <tr><td colspan="5" class="text-center text-muted py-4">No skills yet.</td></tr>
            {% endfor %}
        </tbody>
    </table>
</div>
{% endblock %}

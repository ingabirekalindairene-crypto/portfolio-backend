<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login – Irene's Portfolio</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body {
            min-height: 100vh;
            background: linear-gradient(135deg, #1a3a52 0%, #0f172a 100%);
            display: flex; align-items: center; justify-content: center;
            font-family: 'Segoe UI', sans-serif;
        }
        .login-card {
            background: #fff; border-radius: 16px; padding: 2.5rem;
            width: 100%; max-width: 400px;
            box-shadow: 0 25px 60px rgba(0,0,0,0.3);
        }
        .login-icon {
            width: 70px; height: 70px; background: linear-gradient(135deg, #2563eb, #3b82f6);
            border-radius: 50%; display: flex; align-items: center; justify-content: center;
            margin: 0 auto 1.5rem; font-size: 1.8rem; color: #fff;
        }
        .login-card h2 { color: #1a3a52; font-weight: 800; text-align: center; margin-bottom: 0.3rem; }
        .login-card p  { color: #64748b; text-align: center; margin-bottom: 2rem; font-size: 0.9rem; }
        .form-label { font-weight: 600; color: #1a3a52; font-size: 0.88rem; }
        .form-control { border: 1.5px solid #e2e8f0; border-radius: 8px; padding: 0.7rem 1rem; }
        .form-control:focus { border-color: #2563eb; box-shadow: 0 0 0 0.2rem rgba(37,99,235,0.15); }
        .btn-login {
            background: linear-gradient(135deg, #2563eb, #3b82f6);
            border: none; border-radius: 8px; padding: 0.75rem;
            font-weight: 700; font-size: 1rem; width: 100%; color: #fff;
            transition: all 0.3s;
        }
        .btn-login:hover { transform: translateY(-2px); box-shadow: 0 8px 20px rgba(37,99,235,0.4); }
        .back-link { text-align: center; margin-top: 1.2rem; }
        .back-link a { color: #64748b; font-size: 0.85rem; text-decoration: none; }
        .back-link a:hover { color: #2563eb; }
    </style>
</head>
<body>
<div class="login-card">
    <div class="login-icon"><i class="fas fa-lock"></i></div>
    <h2>Admin Login</h2>
    <p>Ingabire Kalinda Irene – Portfolio Manager</p>

    {% with messages = get_flashed_messages(with_categories=true) %}
      {% if messages %}
        {% for category, message in messages %}
          <div class="alert alert-{{ category }} py-2 mb-3" role="alert">{{ message }}</div>
        {% endfor %}
      {% endif %}
    {% endwith %}

    <form method="POST">
        <div class="mb-3">
            <label for="username" class="form-label">Username</label>
            <input type="text" class="form-control" id="username" name="username"
                   placeholder="Enter username" required autofocus>
        </div>
        <div class="mb-4">
            <label for="password" class="form-label">Password</label>
            <input type="password" class="form-control" id="password" name="password"
                   placeholder="Enter password" required>
        </div>
        <button type="submit" class="btn-login">
            <i class="fas fa-sign-in-alt me-2"></i> Login
        </button>
    </form>

    <div class="back-link">
        <a href="{{ url_for('index') }}"><i class="fas fa-arrow-left me-1"></i> Back to Portfolio</a>
    </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
